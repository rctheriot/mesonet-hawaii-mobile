name: CI

# Quality gate for the dev and main branches. Cloudflare Pages owns the actual
# build-and-deploy on push to main; this workflow exists to catch broken types,
# failing tests, or a broken production build *before* they reach main.
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      # `npm run build` is `tsc -b && vite build` — covers typecheck + production build.
      # No API key needed: it's only read at runtime, so the bundle builds fine without it.
      - name: Typecheck & build
        run: npm run build
